<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CCCCCC"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="35" fill="#FFFFFF" font-family="sans-serif" font-size="20" font-weight="bold">Michelson Verifier Pipeline</text>

  <!-- Legend -->
  <rect x="900" y="12" width="16" height="16" rx="3" fill="none" stroke="#88CCFF" stroke-width="1.5"/>
  <text x="922" y="25" fill="#AAAAAA" font-family="sans-serif" font-size="11">Data</text>
  <rect x="980" y="12" width="16" height="16" rx="3" fill="none" stroke="#88FFAA" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1002" y="25" fill="#AAAAAA" font-family="sans-serif" font-size="11">Agent + Human</text>
  <rect x="1110" y="12" width="16" height="16" rx="3" fill="none" stroke="#CC88FF" stroke-width="1.5"/>
  <text x="1132" y="25" fill="#AAAAAA" font-family="sans-serif" font-size="11">Deterministic</text>
  <rect x="1240" y="12" width="16" height="16" rx="3" fill="none" stroke="#FFCC88" stroke-width="1.5"/>
  <text x="1262" y="25" fill="#AAAAAA" font-family="sans-serif" font-size="11">Output</text>
  <rect x="1330" y="12" width="16" height="16" rx="3" fill="none" stroke="#FF8888" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="1352" y="25" fill="#AAAAAA" font-family="sans-serif" font-size="11">Agent only</text>

  <!-- ===== ROW 1: Main pipeline ===== -->

  <!-- Data: Michelson Script (.tz) -->
  <rect x="30" y="80" width="160" height="70" rx="10" fill="none" stroke="#88CCFF" stroke-width="1.5"/>
  <text x="110" y="110" text-anchor="middle" fill="#88CCFF" font-family="sans-serif" font-size="14" font-weight="bold">Michelson Script</text>
  <text x="110" y="130" text-anchor="middle" fill="#88CCFF" font-family="sans-serif" font-size="12" opacity="0.7">.tz file</text>

  <!-- Data: Informal Specs -->
  <rect x="30" y="170" width="160" height="50" rx="10" fill="none" stroke="#88CCFF" stroke-width="1.5"/>
  <text x="110" y="200" text-anchor="middle" fill="#88CCFF" font-family="sans-serif" font-size="13">Informal specs</text>

  <!-- Arrows from both inputs to Agent -->
  <line x1="190" y1="115" x2="240" y2="135" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="195" x2="240" y2="160" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Process: Agent + Human annotation (dashed = interactive) -->
  <rect x="250" y="100" width="200" height="90" rx="10" fill="none" stroke="#88FFAA" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="350" y="130" text-anchor="middle" fill="#88FFAA" font-family="sans-serif" font-size="14" font-weight="bold">Spec Annotation</text>
  <text x="350" y="150" text-anchor="middle" fill="#88FFAA" font-family="sans-serif" font-size="12" opacity="0.8">agent + human</text>
  <text x="350" y="170" text-anchor="middle" fill="#88FFAA" font-family="sans-serif" font-size="12" opacity="0.8">→ .tzw file</text>

  <!-- Arrow to Why3 -->
  <line x1="450" y1="145" x2="510" y2="145" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Process: Why3 Automatic Provers (solid = deterministic) -->
  <rect x="520" y="105" width="200" height="80" rx="10" fill="none" stroke="#CC88FF" stroke-width="1.5"/>
  <text x="620" y="135" text-anchor="middle" fill="#CC88FF" font-family="sans-serif" font-size="14" font-weight="bold">Automatic Provers</text>
  <text x="620" y="155" text-anchor="middle" fill="#CC88FF" font-family="sans-serif" font-size="12" opacity="0.8">Why3</text>
  <text x="620" y="172" text-anchor="middle" fill="#AAAAAA" font-family="sans-serif" font-size="10" font-style="italic">deterministic</text>

  <!-- Arrow to Rocq -->
  <line x1="720" y1="145" x2="780" y2="145" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="750" y="135" text-anchor="middle" fill="#999999" font-family="sans-serif" font-size="10" font-style="italic">remaining</text>

  <!-- Process: Interactive Proofs in Rocq (solid = deterministic) -->
  <rect x="790" y="105" width="200" height="80" rx="10" fill="none" stroke="#CC88FF" stroke-width="1.5"/>
  <text x="890" y="135" text-anchor="middle" fill="#CC88FF" font-family="sans-serif" font-size="14" font-weight="bold">Interactive Proofs</text>
  <text x="890" y="155" text-anchor="middle" fill="#CC88FF" font-family="sans-serif" font-size="12" opacity="0.8">Rocq / Coq</text>
  <text x="890" y="172" text-anchor="middle" fill="#AAAAAA" font-family="sans-serif" font-size="10" font-style="italic">deterministic</text>

  <!-- Arrow to Certificate -->
  <line x1="990" y1="145" x2="1060" y2="145" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output: Certificate -->
  <rect x="1070" y="110" width="200" height="70" rx="10" fill="none" stroke="#FFCC88" stroke-width="1.5"/>
  <text x="1170" y="138" text-anchor="middle" fill="#FFCC88" font-family="sans-serif" font-size="14" font-weight="bold">Certificate</text>
  <text x="1170" y="158" text-anchor="middle" fill="#FFCC88" font-family="sans-serif" font-size="11" opacity="0.8">no need to trust VCG</text>

  <!-- ===== ROW 2: PBT branch ===== -->

  <!-- Branch from .tzw (after annotation) downward -->
  <line x1="350" y1="190" x2="350" y2="260" stroke="#CCCCCC" stroke-width="1.5"/>
  <line x1="350" y1="260" x2="410" y2="260" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Data: .tzw + Implementation -->
  <rect x="420" y="235" width="200" height="50" rx="10" fill="none" stroke="#88CCFF" stroke-width="1.5"/>
  <text x="520" y="265" text-anchor="middle" fill="#88CCFF" font-family="sans-serif" font-size="12">.tzw specs + implementation</text>

  <!-- Arrow to PBT -->
  <line x1="620" y1="260" x2="680" y2="260" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Process: PBT (deterministic) -->
  <rect x="690" y="225" width="240" height="70" rx="10" fill="none" stroke="#CC88FF" stroke-width="1.5"/>
  <text x="810" y="252" text-anchor="middle" fill="#CC88FF" font-family="sans-serif" font-size="14" font-weight="bold">Property-Based Tests</text>
  <text x="810" y="272" text-anchor="middle" fill="#CC88FF" font-family="sans-serif" font-size="11" opacity="0.8">spec ↔ implementation</text>
  <text x="810" y="288" text-anchor="middle" fill="#AAAAAA" font-family="sans-serif" font-size="10" font-style="italic">deterministic</text>

  <!-- Arrow to Mutation Testing -->
  <line x1="930" y1="260" x2="990" y2="260" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Process: Mutation Testing (agent only, dotted) -->
  <rect x="1000" y="225" width="220" height="70" rx="10" fill="none" stroke="#FF8888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1110" y="252" text-anchor="middle" fill="#FF8888" font-family="sans-serif" font-size="14" font-weight="bold">Mutation Testing</text>
  <text x="1110" y="272" text-anchor="middle" fill="#FF8888" font-family="sans-serif" font-size="11" opacity="0.8">validates the PBT itself</text>
  <text x="1110" y="288" text-anchor="middle" fill="#AAAAAA" font-family="sans-serif" font-size="10" font-style="italic">agent only</text>

  <!-- Output: Conformance Report -->
  <line x1="1220" y1="260" x2="1290" y2="260" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="1300" y="230" width="200" height="60" rx="10" fill="none" stroke="#FFCC88" stroke-width="1.5"/>
  <text x="1400" y="258" text-anchor="middle" fill="#FFCC88" font-family="sans-serif" font-size="14" font-weight="bold">Conformance</text>
  <text x="1400" y="275" text-anchor="middle" fill="#FFCC88" font-family="sans-serif" font-size="11" opacity="0.8">spec ↔ impl validated</text>

</svg>
