baseURL = "https://yann.regis-gianas.org/"
title = "Yann Régis-Gianas"
theme = "PaperMod"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
paginate = 10

enableRobotsTXT = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    [languages.en.params]
      subtitle = "Software Engineering in the Agent Era"
  [languages.fr]
    languageName = "Français"
    weight = 2
    [languages.fr.params]
      subtitle = "Génie logiciel à l'ère des agents"
  [languages.es]
    languageName = "Español"
    weight = 3
    [languages.es.params]
      subtitle = "Ingeniería de software en la era de los agentes"
  [languages.zh]
    languageName = "中文"
    weight = 4
    [languages.zh.params]
      subtitle = "智能体时代的软件工程"
  [languages.de]
    languageName = "Deutsch"
    weight = 5
    [languages.de.params]
      subtitle = "Softwareentwicklung im Zeitalter der Agenten"
  [languages.ja]
    languageName = "日本語"
    weight = 6
    [languages.ja.params]
      subtitle = "エージェント時代のソフトウェアエンジニアリング"
  [languages.pt]
    languageName = "Português"
    weight = 7
    [languages.pt.params]
      subtitle = "Engenharia de software na era dos agentes"

[params]
  author = "Yann Régis-Gianas"
  description = "Personal blog on software engineering in the agent era"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"
  comments = true
  mainSections = ["posts"]
  displayFullLangName = true

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yurug"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/YannRG"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  series = "series"

[markup]
  [markup.highlight]
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/en/posts/"
    weight = 10
  [[menu.main]]
    identifier = "talks"
    name = "Talks"
    url = "/en/talks/"
    weight = 20
  [[menu.main]]
    identifier = "elsewhere"
    name = "Elsewhere"
    url = "/en/elsewhere/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/en/about/"
    weight = 40
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 50
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/en/search/"
    weight = 60
